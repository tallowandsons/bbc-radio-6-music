name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed so git describe can find tags

      - name: Build
        run: bash build.sh

      - name: Zip app bundle
        run: |
          VERSION=${GITHUB_REF_NAME}
          zip -r "BBC.Radio.6.Music-${VERSION}.zip" "BBC Radio 6 Music.app"
          echo "ASSET=BBC.Radio.6.Music-${VERSION}.zip" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.VERSION }}
          files: ${{ env.ASSET }}
          body: |
            ## Install

            1. Download `BBC.Radio.6.Music-${{ env.VERSION }}.zip` and unzip it
            2. Move `BBC Radio 6 Music.app` to your Applications folder
            3. **First launch only** — macOS will block an unsigned app. Right-click the app → **Open** → **Open** to allow it, or run:
               ```
               xattr -dr com.apple.quarantine "/Applications/BBC Radio 6 Music.app"
               ```
